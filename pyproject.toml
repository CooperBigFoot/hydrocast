[tool.uv.workspace]
members = ["time-flies", "data-leak", "coach", "launchpad"]

[dependency-groups]
dev = [
    "pytest>=8.3",
    "pytest-cov>=6.2.1",
    "ruff>=0.12",
    "bump-my-version>=1.2.7",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "N", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501", "N803", "N806"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["time-flies/tests", "data-leak/tests", "coach/tests", "launchpad/tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["--strict-markers", "--strict-config", "-ra", "--import-mode=importlib"]
